<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TaskFlow{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
  </script>
</head>
<body class="h-full bg-gray-50 font-sans dark:bg-gray-950">
  <div class="flex min-h-full flex-col items-center justify-center px-4 py-12 sm:px-6">
    <div class="mb-8 flex items-center gap-2">
      <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-primary-600 text-lg font-bold text-white">T</div>
      <span class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white">TaskFlow</span>
    </div>

    <div class="w-full max-w-md animate-slide-up card p-6 sm:p-8">
      {% block content %}{% endblock %}
    </div>
  </div>

  <div id="toast-container" class="fixed bottom-4 right-4 z-[100] flex w-full max-w-sm flex-col gap-2 sm:bottom-6 sm:right-6"></div>
  <script>
    window.__FLASHED_MESSAGES__ = [
      {% for category, message in get_flashed_messages(with_categories=true) %}
        ["{{ category }}", {{ message | tojson }}],
      {% endfor %}
    ];
  </script>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <script src="{{ url_for('static', filename='js/toast.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
