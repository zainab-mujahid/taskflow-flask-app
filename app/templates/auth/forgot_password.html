{% extends 'auth/base_auth.html' %}
{% block title %}Forgot password · TaskFlow{% endblock %}
{% block content %}
  <h2 class="text-xl font-semibold text-gray-900 dark:text-white">Forgot your password?</h2>
  <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Enter your email and we'll send you a reset link.</p>

  <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="mt-6 space-y-4" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div>
      <label class="label" for="email">Email address</label>
      <input class="input {{ 'input-error' if errors.get('email') }}" type="email" id="email" name="email"
             value="{{ form_data.get('email', '') }}" placeholder="you@example.com" autofocus required>
      {% if errors.get('email') %}<p class="error-text">{{ errors['email'][0] }}</p>{% endif %}
    </div>

    <button type="submit" class="btn-primary w-full">Send reset link</button>
  </form>

  <p class="mt-6 text-center text-sm text-gray-500 dark:text-gray-400">
    <a href="{{ url_for('auth.login') }}" class="font-medium text-primary-600 hover:text-primary-500">&larr; Back to sign in</a>
  </p>
{% endblock %}
