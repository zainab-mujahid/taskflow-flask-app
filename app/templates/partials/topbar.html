<header class="sticky top-0 z-30 flex h-16 shrink-0 items-center justify-between border-b border-gray-200 bg-white/80 px-4 backdrop-blur dark:border-gray-800 dark:bg-gray-900/80 sm:px-6">
  <div class="flex items-center gap-3">
    <button id="sidebar-open" class="rounded-lg p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 lg:hidden" aria-label="Open menu">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5M3.75 17.25h16.5"/></svg>
    </button>
    <h1 class="text-lg font-semibold text-gray-800 dark:text-gray-100 sm:text-xl">{% block page_title %}{% endblock %}</h1>
  </div>

  <div class="flex items-center gap-2 sm:gap-3">
    <button id="theme-toggle" class="rounded-lg p-2 text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800" aria-label="Toggle theme">
      <svg class="h-5 w-5 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/></svg>
      <svg class="hidden h-5 w-5 dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"/></svg>
    </button>

    <div class="relative">
      <button data-dropdown-toggle="notifications-menu" class="relative rounded-lg p-2 text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-800" aria-label="Notifications">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>
        {% if notifications %}
        <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-red-500"></span>
        {% endif %}
      </button>
      <div id="notifications-menu" class="dropdown-menu absolute right-0 z-20 mt-2 hidden w-80 animate-fade-in rounded-lg border border-gray-200 bg-white py-2 shadow-lg dark:border-gray-700 dark:bg-gray-800">
        <div class="px-4 pb-2 text-sm font-semibold text-gray-700 dark:text-gray-200">Notifications</div>
        <div class="max-h-80 overflow-y-auto">
          {% for n in notifications %}
          <a href="{{ url_for('tasks.edit', task_id=n.task.id) }}" class="flex items-start gap-2.5 px-4 py-2.5 hover:bg-gray-50 dark:hover:bg-gray-700">
            <span class="mt-1 h-2 w-2 shrink-0 rounded-full {{ 'bg-red-500' if n.type == 'overdue' else 'bg-amber-500' }}"></span>
            <div class="min-w-0">
              <p class="truncate text-sm text-gray-700 dark:text-gray-200">{{ n.task.title }}</p>
              <p class="text-xs {{ 'text-red-500' if n.type == 'overdue' else 'text-amber-500' }}">
                {{ 'Overdue' if n.type == 'overdue' else 'Due soon' }} · {{ n.task.due_date.strftime('%b %d, %I:%M %p') }}
              </p>
            </div>
          </a>
          {% else %}
          <p class="px-4 py-6 text-center text-sm text-gray-400">You're all caught up!</p>
          {% endfor %}
        </div>
      </div>
    </div>

    <div class="relative">
      <button data-dropdown-toggle="user-menu" class="flex items-center gap-2 rounded-lg p-1.5 hover:bg-gray-100 dark:hover:bg-gray-800">
        {% if g.current_user.avatar_url %}
          <img src="{{ g.current_user.avatar_url }}" class="h-8 w-8 rounded-full object-cover" alt="Avatar">
        {% else %}
          <div class="flex h-8 w-8 items-center justify-center rounded-full bg-primary-600 text-sm font-semibold text-white">
            {{ g.current_user.name[:1].upper() }}
          </div>
        {% endif %}
        <span class="hidden text-sm font-medium text-gray-700 dark:text-gray-200 sm:block">{{ g.current_user.name.split(' ')[0] }}</span>
      </button>
      <div id="user-menu" class="dropdown-menu absolute right-0 mt-2 hidden w-48 animate-fade-in rounded-lg border border-gray-200 bg-white py-1 shadow-lg dark:border-gray-700 dark:bg-gray-800">
        <a href="{{ url_for('profile.index') }}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 dark:text-gray-200 dark:hover:bg-gray-700">Profile & Settings</a>
        <a href="{{ url_for('auth.logout') }}" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-50 dark:hover:bg-gray-700">Sign out</a>
      </div>
    </div>
  </div>
</header>
